<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="text-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    <linearGradient id="brand-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9100"/>
      <stop offset="50%" stop-color="#FF7900"/>
      <stop offset="100%" stop-color="#E05300"/>
    </linearGradient>
    <linearGradient id="brand-charcoal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D2D2D" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>
    <linearGradient id="ring-silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#B0B0B0"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  
  <!-- Outer Double Silver Rings with Charcoal Background -->
  <circle cx="250" cy="250" r="230" fill="url(#brand-charcoal)" stroke="url(#ring-silver)" stroke-width="5" filter="url(#logo-shadow)"/>
  <circle cx="250" cy="250" r="216" fill="none" stroke="#FF7900" stroke-width="1.5" stroke-dasharray="10 5" opacity="0.7"/>
  <circle cx="250" cy="250" r="208" fill="none" stroke="url(#ring-silver)" stroke-width="2"/>

  <!-- Orange Center Circle -->
  <circle cx="250" cy="250" r="150" fill="url(#brand-orange)" stroke="#121212" stroke-width="6"/>
  <circle cx="250" cy="250" r="142" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>

  <!-- "Garagem" Styled Text (Script Style) -->
  <text x="250" y="215" font-family="'Alex Brush', 'Great Vibes', 'Brush Script MT', 'cursive'" font-size="100" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#text-glow)">Garagem</text>
  
  <!-- "844" Bold Number -->
  <text x="250" y="300" font-family="'Montserrat', 'Arial Black', sans-serif" font-size="70" font-weight="900" fill="#FFFFFF" stroke="#121212" stroke-width="2.5" text-anchor="middle" letter-spacing="3" filter="url(#text-glow)">844</text>
  
  <!-- Curved Text Path for "GARAGEM & EVENTOS" -->
  <!-- Arc path at the bottom of the inner ring -->
  <path id="bottomArc" d="M 120,250 A 130,130 0 0,0 380,250" fill="none"/>
  
  <text font-family="'Montserrat', 'Outfit', 'Helvetica', sans-serif" font-size="14.5" font-weight="800" fill="#FFFFFF" letter-spacing="6" filter="url(#text-glow)">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      GARAGEM &amp; EVENTOS
    </textPath>
  </text>
</svg>
